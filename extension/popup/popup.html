<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GDDL Demon Recommender</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>Demon Recommender</h1>
    <span id="status-badge" class="badge badge--checking">Checking...</span>
  </header>

  <section class="section">
    <label for="level-id-input">Reference Level ID (optional)</label>
    <input id="level-id-input" type="text" placeholder="e.g. 12345" />
  </section>

  <section class="section">
    <label>Desired Skills</label>
    <div id="tag-list" class="slider-list"></div>
  </section>

  <section id="filters-panel" class="section hidden">
    <section class="section row">
      <div class="field">
        <label for="tier-min">Tier Min</label>
        <input id="tier-min" type="number" min="1" max="39" placeholder="1" />
      </div>
      <div class="field">
        <label for="tier-max">Tier Max</label>
        <input id="tier-max" type="number" min="1" max="39" placeholder="39" />
      </div>
    </section>
    <section class="section row">
      <div class="field">
        <label for="enjoyment-min">Enjoyment Min</label>
        <input id="enjoyment-min" type="number" min="0" max="10" step="0.1" placeholder="0" />
      </div>
      <div class="field">
        <label for="enjoyment-max">Enjoyment Max</label>
        <input id="enjoyment-max" type="number" min="0" max="10" step="0.1" placeholder="10" />
      </div>
    </section>
    <section class="section row">
      <div class="field">
        <label for="rating-count-min">Rating Count Min</label>
        <input id="rating-count-min" type="number" min="0" placeholder="0" />
      </div>
      <div class="field">
        <label for="rating-count-max">Rating Count Max</label>
        <input id="rating-count-max" type="number" min="0" placeholder="" />
      </div>
    </section>
    <label for="creator-input">Creator (partial match)</label>
    <input id="creator-input" type="text" placeholder="e.g. Dorami" />
    <section class="section row">
      <label class="checkbox-label">
        <input id="show-beaten-input" type="checkbox" />
        Show already-beaten levels in results
      </label>
    </section>
  </section>

  <button id="recommend-btn" class="btn-primary">Get Recommendations</button>

  <section id="results" class="results hidden"></section>

  <section id="settings-panel" class="section hidden">
    <section class="section row">
      <div class="field">
        <label for="limit">Results</label>
        <input id="limit" type="number" min="1" max="25" value="10" />
      </div>
    </section>
    <label for="api-url-input">Backend API URL</label>
    <input id="api-url-input" type="text" placeholder="http://localhost:8000" />
    <div class="settings-actions">
      <button id="save-url-btn" class="btn-secondary">Save</button>
      <button id="reset-url-btn" class="btn-ghost">Reset to default</button>
    </div>
    <span id="settings-status" class="settings-status"></span>
    <label class="checkbox-label">
      <input id="show-panel-input" type="checkbox" checked />
      Show recommendation panel on level pages
    </label>
    <label class="checkbox-label">
      <input id="show-match-badge-input" type="checkbox" checked />
      Show skill match badge on level pages
    </label>
  </section>

  <footer>
    <a id="filters-link" href="#">Filters</a>
    <a id="settings-link" href="#">Settings</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
